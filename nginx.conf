server {
    listen 80;
    server_name fitphysiokatrin.com www.fitphysiokatrin.com;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # www → non-www (Coolify/Traefik übernimmt HTTPS, daher hier nur intern)
    if ($host = 'www.fitphysiokatrin.com') {
        return 301 $scheme://fitphysiokatrin.com$request_uri;
    }

    # Sicherheits-Header
    add_header X-Content-Type-Options  "nosniff"                    always;
    add_header X-Frame-Options          "SAMEORIGIN"                 always;
    add_header X-XSS-Protection         "1; mode=block"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Caching für statische Assets
    location ~* \.(css|js|svg|woff2|jpg|jpeg|png|webp|ico)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    # Saubere URLs: /6am → /6am/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Root → /6am/
    location = / {
        return 301 /6am/;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # 404 → Landingpage
    error_page 404 /6am/index.html;
}
